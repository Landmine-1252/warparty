services:
  warparty:
    build: .
    ports:
      - "8080:8080"
    environment:
      WARPARTY_PUBLIC_BASE_URL: http://localhost:8080
    volumes:
      - warparty-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  warparty-data:
