<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Warparty{% endblock %}</title>
  <link rel="icon" type="image/png" sizes="96x96" href="{{ url_for('static', path='icons/favicon/favicon-96x96.png') }}">
  <link rel="icon" type="image/svg+xml" sizes="any" href="{{ url_for('static', path='icons/favicon/favicon.svg') }}">
  <link rel="shortcut icon" href="{{ url_for('static', path='icons/favicon/favicon.ico') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', path='icons/favicon/apple-touch-icon.png') }}">
  <link rel="manifest" href="{{ url_for('static', path='icons/favicon/site.webmanifest') }}">
  <meta name="theme-color" content="#f0b72f" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f0d0b" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="{{ url_for('static', path='css/pure-min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', path='css/warparty.css') }}">
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true" focusable="false">
    <symbol id="icon-x" viewBox="0 0 24 24">
      <path d="M18 6 6 18M6 6l12 12"></path>
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24">
      <path d="M3 6h18"></path>
      <path d="M8 6V4h8v2"></path>
      <path d="M19 6l-1 14H6L5 6"></path>
      <path d="M10 11v5"></path>
      <path d="M14 11v5"></path>
    </symbol>
    <symbol id="icon-chevron-up" viewBox="0 0 24 24">
      <path d="m18 15-6-6-6 6"></path>
    </symbol>
    <symbol id="icon-chevron-down" viewBox="0 0 24 24">
      <path d="m6 9 6 6 6-6"></path>
    </symbol>
    <symbol id="icon-link" viewBox="0 0 24 24">
      <path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"></path>
      <path d="M14 11a5 5 0 0 0-7.1 0l-2 2A5 5 0 0 0 12 20.1l1.1-1.1"></path>
    </symbol>
    <symbol id="icon-hash" viewBox="0 0 24 24">
      <path d="M4 9h16"></path>
      <path d="M4 15h16"></path>
      <path d="M10 3 8 21"></path>
      <path d="m16 3-2 18"></path>
    </symbol>
  </svg>
  <div class="app-shell">
    <nav class="app-nav" aria-label="Primary">
      <a class="app-brand" href="/">
        <img class="app-brand-mark brand-mark" src="{{ url_for('static', path='icons/favicon/icon-512.png') }}" alt="" width="34" height="34">
        <span class="app-brand-text">Warparty</span>
      </a>
      <div class="app-nav-links">
        <a href="/">Create</a>
        <a href="/">Join</a>
        {% if current_player is defined and current_player %}
          <form
            class="nav-leave-form"
            method="post"
            action="/party/{{ party.id }}/leave"
            data-confirm-leave-party
            data-nav-leave-form
            {% if not (can_current_player_leave is defined and can_current_player_leave) %}hidden{% endif %}
          >
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button class="nav-link-button nav-link-danger" type="submit">Leave</button>
          </form>
        {% endif %}
      </div>
    </nav>
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>
  <script>
  (() => {
    document.querySelectorAll("[data-invite-code-input]").forEach((input) => {
      input.addEventListener("input", () => {
        input.value = input.value.replace(/\s+/g, "").toUpperCase();
      });
    });
  })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
