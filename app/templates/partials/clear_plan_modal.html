<dialog id="clear-plan-modal" class="warplan-modal confirm-modal">
  <div class="modal-panel">
    <div class="modal-header">
      <div>
        <span class="slot-label">Clear Plan</span>
        <h2>Remove your War Plan?</h2>
      </div>
      <button class="button-icon modal-close" type="button" data-cancel-clear aria-label="Close" title="Close">
        <svg class="button-svg" aria-hidden="true">
          <use href="#icon-x"></use>
        </svg>
      </button>
    </div>
    <p class="modal-copy">This removes your saved activities and progress. The party route will recalculate after the plan is cleared.</p>
    <div class="action-row modal-actions">
      <button class="button-danger" type="button" data-confirm-clear-submit>Clear Plan</button>
      <button class="button-secondary" type="button" data-cancel-clear>Cancel</button>
    </div>
  </div>
</dialog>
