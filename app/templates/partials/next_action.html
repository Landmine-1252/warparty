<section class="panel next-action-panel">
  <div class="panel-header">
    <h2 class="panel-title">Next Party Action</h2>
  </div>
  <h3 class="next-action-title">{{ next_action.title }}</h3>
  <p class="next-action-message">{{ next_action.message }}</p>
  <div class="next-action-meta">
    <span class="status-pill success">{{ ready_players_count }} ready</span>
    <span class="status-pill {% if open_slots == 0 %}status-muted{% else %}warning{% endif %}">{{ open_slots }} open</span>
    <span class="status-pill">{{ route|length }} steps</span>
  </div>
  {% if next_action.state == "readonly" %}
    <div class="action-row">
      <a class="button-primary" href="/join/{{ party.invite_code }}">{{ next_action.button }}</a>
    </div>
  {% endif %}
</section>
