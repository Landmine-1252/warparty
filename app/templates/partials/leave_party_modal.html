<dialog id="leave-party-modal" class="warplan-modal confirm-modal">
  <div class="modal-panel">
    <div class="modal-header">
      <div>
        <span class="slot-label">Leave Party</span>
        <h2>Free your party slot?</h2>
      </div>
      <button class="button-icon modal-close" type="button" data-cancel-leave-party aria-label="Close" title="Close">
        <svg class="button-svg" aria-hidden="true">
          <use href="#icon-x"></use>
        </svg>
      </button>
    </div>
    <p class="modal-copy">Your War Plan and progress will be removed from this Warparty. You can rejoin later if a slot is open.</p>
    <div class="action-row modal-actions">
      <button class="button-danger" type="button" data-confirm-leave-party-submit>Leave Party</button>
      <button class="button-secondary" type="button" data-cancel-leave-party>Cancel</button>
    </div>
  </div>
</dialog>
